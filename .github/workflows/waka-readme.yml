name: Waka Readme

on:
  workflow_dispatch: 
  schedule:
    - cron: "42 3 * * *"
  push:
    branches:
      - main
      - master 
  watch:
    types: [started] 

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update WakaTime Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: last_30_days 
          LANG_COUNT: 5
          SHOW_TIME: true
          SHOW_TOTAL: false
          STOP_AT_OTHER: true